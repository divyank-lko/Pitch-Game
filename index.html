<style>
/* ═══════════════════════════════════
   NIGHT THEME (default)
═══════════════════════════════════ */
:root{
  --bg:#080F0A; --s1:#101A12; --s2:#162019; --s3:#1C2B1F;
  --b1:#243028; --b2:#2E3E32;
  --t1:#EAE5DA; --t2:#8BA090; --t3:#4E6455;
  --gold:#D4A84B; --gold2:#F0C46A; --goldD:#8B6A1F;
  --red:#C0252E; --redS:rgba(192,37,46,.12); --redD:#7A1224;
  --gr:#277A32; --grS:rgba(39,122,50,.15);
  --r:10px; --r2:16px;
  --fd:'Teko',sans-serif; --fm:'DM Mono',monospace; --fb:'Hind',sans-serif;
  --shadow:0 2px 16px rgba(0,0,0,.5);
  --glow:0 0 32px rgba(212,168,75,.15);
}
body.day{
  --bg:#F0EDE6; --s1:#FFFFFF; --s2:#FAFAF7; --s3:#F5F2EC;
  --b1:#E2DDD5; --b2:#D5CFC5;
  --t1:#1A1712; --t2:#5C5650; --t3:#9A9490;
  --shadow:0 2px 16px rgba(0,0,0,.08);
  --glow:0 0 24px rgba(212,168,75,.1);
}

/* ═══════ BASE ═══════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--t1);font-family:var(--fb);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;transition:background .4s,color .4s;
}

/* Top accent bar */
.accent-bar{
  position:fixed;top:0;left:0;right:0;height:2px;z-index:200;
  background:linear-gradient(90deg,transparent,var(--gold),var(--red),var(--gold),transparent);
}

/* ═══════ LAYOUT ═══════ */
.wrap{width:100%;max-width:460px;padding:0 16px 80px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;}
.screen{display:none;width:100%;flex-direction:column;align-items:center;padding-top:18px;}
.screen.active{display:flex;animation:screenIn .32s cubic-bezier(.25,.46,.45,.94) both;}
@keyframes screenIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ═══════ CONTROLS ═══════ */
.top-bar{position:fixed;top:8px;right:12px;z-index:150;display:flex;gap:6px;}
.ctrl{
  height:30px;padding:0 11px;
  background:var(--s2);border:1px solid var(--b1);border-radius:15px;
  font-family:var(--fm);font-size:11px;color:var(--t2);
  cursor:pointer;letter-spacing:.5px;
  display:flex;align-items:center;gap:5px;
  transition:all .2s;box-shadow:var(--shadow);
}
.ctrl:hover{border-color:var(--gold);color:var(--gold);}

/* ═══════ CRICKET BALL — SVG ═══════ */
.ball-svg{display:block;margin:8px auto 10px;}

/* ═══════ LOGO ═══════ */
.logo-title{
  font-family:var(--fd);font-size:clamp(56px,16vw,76px);
  font-weight:700;letter-spacing:12px;line-height:1;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 40%,#E8B84A 70%,var(--gold2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(212,168,75,.25));
  margin-bottom:5px;
}
.logo-sub{font-family:var(--fm);font-size:11px;letter-spacing:4px;color:var(--t3);margin-bottom:20px;}

/* ═══════ TABS ═══════ */
.tabs{
  width:100%;display:flex;gap:0;margin-bottom:18px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);
  padding:5px;box-shadow:var(--shadow);
}
.tab{
  flex:1;padding:10px 6px;border:none;background:transparent;
  font-family:var(--fd);font-size:13px;letter-spacing:2px;color:var(--t3);
  cursor:pointer;border-radius:12px;transition:all .25s;text-transform:uppercase;
}
.tab.on{
  background:var(--s3);color:var(--gold);
  box-shadow:0 1px 6px rgba(0,0,0,.2);
  border:1px solid var(--b1);
}

/* ═══════ STREAK HERO ═══════ */
.streak-hero{
  width:100%;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--s2) 0%,var(--s3) 100%);
  border:1px solid var(--b1);border-radius:var(--r2);
  padding:18px 20px;margin-bottom:12px;
  box-shadow:var(--shadow);
  transition:background .5s,border-color .5s;
}
.streak-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,75,.12) 0%,transparent 70%);
  pointer-events:none;
}
.streak-top{display:flex;align-items:flex-start;justify-content:space-between;}
.streak-num{
  font-family:var(--fd);font-size:72px;line-height:1;
  color:var(--gold2);
  text-shadow:0 0 30px rgba(212,168,75,.3);
  animation:numPop .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes numPop{from{transform:scale(.8);opacity:0}to{transform:none;opacity:1}}
.streak-right{text-align:right;padding-top:6px;}
.streak-pct{font-family:var(--fd);font-size:34px;color:var(--t1);}
.streak-pct-lbl{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-top:2px;}
.streak-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:rgba(212,168,75,.12);border:1px solid rgba(212,168,75,.25);
  border-radius:20px;padding:4px 12px;
}
.streak-badge .icon{font-size:14px;}
.streak-badge .lbl{font-family:var(--fd);font-size:16px;letter-spacing:3px;color:var(--gold);}
.streak-cap{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-top:5px;}

/* ═══════ MINI STATS ═══════ */
.mini-stats{display:flex;gap:8px;width:100%;margin-bottom:14px;}
.ms{
  flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:14px 8px;text-align:center;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
}
.ms:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.ms-val{font-family:var(--fd);font-size:32px;color:var(--gold2);animation:numPop .4s both;}
.ms-lbl{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-top:3px;}

/* ═══════ INFO CARD ═══════ */
.info-card{
  width:100%;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:16px 18px;margin-bottom:14px;
  box-shadow:var(--shadow);
}
.info-card h3{font-family:var(--fm);font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;}
.info-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:9px;font-size:13px;line-height:1.55;color:var(--t2);}
.info-row:last-child{margin-bottom:0;}
.info-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* ═══════ PLAYED BANNER ═══════ */
.played-banner{
  width:100%;background:var(--grS);border:1.5px solid var(--gr);
  border-radius:var(--r);padding:14px;text-align:center;margin-bottom:10px;
  animation:screenIn .3s both;
}
.played-title{font-family:var(--fd);font-size:18px;letter-spacing:3px;color:var(--gr);margin-bottom:3px;}
.played-sub{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t2);}

/* ═══════ COUNTDOWN ═══════ */
.countdown{
  width:100%;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:14px;text-align:center;margin-top:8px;
  box-shadow:var(--shadow);
}
.cd-lbl{font-family:var(--fm);font-size:9px;letter-spacing:4px;color:var(--t3);text-transform:uppercase;margin-bottom:5px;}
.cd-time{font-family:var(--fd);font-size:42px;letter-spacing:6px;color:var(--t1);}

/* ═══════ BUTTONS ═══════ */
.btn-play{
  width:100%;background:linear-gradient(135deg,var(--red) 0%,#D9404A 100%);
  color:#fff;border:none;font-family:var(--fd);font-size:21px;letter-spacing:4px;
  border-radius:var(--r);padding:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:10px;
  box-shadow:0 4px 24px rgba(192,37,46,.35),0 0 0 0 rgba(192,37,46,.3);
  transition:transform .15s,box-shadow .15s;
  animation:breathe 3s ease-in-out infinite;
}
@keyframes breathe{0%,100%{box-shadow:0 4px 24px rgba(192,37,46,.35),0 0 0 0 rgba(192,37,46,.2)}50%{box-shadow:0 4px 24px rgba(192,37,46,.5),0 0 16px 4px rgba(192,37,46,.15)}}
.btn-play:hover{transform:translateY(-2px);animation:none;box-shadow:0 8px 32px rgba(192,37,46,.5);}
.btn-play:active{transform:scale(.97);}
.btn-outline{
  width:100%;background:transparent;border:1.5px solid var(--b2);
  border-radius:var(--r);color:var(--t1);
  font-family:var(--fd);font-size:17px;letter-spacing:2px;
  padding:12px;cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-wa{
  width:100%;background:linear-gradient(135deg,#25D366,#20B858);
  color:#fff;border:none;border-radius:var(--r);
  font-family:var(--fd);font-size:18px;letter-spacing:3px;
  padding:15px;cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 4px 16px rgba(37,211,102,.25);
  transition:transform .15s;
}
.btn-wa:hover{transform:translateY(-2px);}
.btn-gold{
  width:100%;background:linear-gradient(135deg,rgba(212,168,75,.15),rgba(212,168,75,.08));
  border:1.5px solid rgba(212,168,75,.4);color:var(--gold);
  font-family:var(--fd);font-size:17px;letter-spacing:3px;
  border-radius:var(--r);padding:13px;cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.btn-gold:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(212,168,75,.2);}
.btn-ghost{
  width:100%;background:transparent;border:1px solid var(--b1);
  border-radius:var(--r);color:var(--t2);
  font-family:var(--fb);font-size:13px;font-weight:500;
  padding:10px;cursor:pointer;margin-bottom:8px;transition:all .15s;
}
.btn-ghost:hover{border-color:var(--t2);color:var(--t1);}
.btn-exit{
  width:100%;background:transparent;border:1px dashed var(--redD);
  border-radius:var(--r);color:var(--redD);
  font-family:var(--fm);font-size:9px;letter-spacing:2px;
  padding:8px;cursor:pointer;text-transform:uppercase;
  transition:all .2s;margin-top:4px;text-align:center;
}
.btn-exit:hover{border-color:var(--red);color:var(--red);}
.mid-share{
  width:100%;display:none;background:transparent;
  border:1px dashed var(--b2);border-radius:var(--r);
  padding:9px;font-family:var(--fm);font-size:9px;letter-spacing:2px;
  color:var(--t2);cursor:pointer;text-transform:uppercase;
  margin-bottom:8px;text-align:center;transition:all .2s;
}
.mid-share.show{display:block;animation:screenIn .3s both;}
.mid-share:hover{border-color:#25D366;color:#25D366;}

/* ═══════ PRACTICE LIST ═══════ */
.prac-note{
  width:100%;background:rgba(212,168,75,.08);
  border:1px solid rgba(212,168,75,.2);border-radius:var(--r);
  padding:11px 15px;margin-bottom:13px;
  font-family:var(--fm);font-size:10px;color:var(--gold);
  letter-spacing:.5px;line-height:1.7;
}
.prac-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px;background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:8px;cursor:pointer;
  transition:all .2s;box-shadow:var(--shadow);
}
.prac-item:hover{border-color:var(--gold);transform:translateX(3px);box-shadow:var(--glow);}
.prac-num{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:2px;}
.prac-name{font-family:var(--fd);font-size:20px;letter-spacing:2px;color:var(--t1);margin-top:2px;}
.prac-score{font-family:var(--fm);font-size:10px;color:var(--gold);margin-top:2px;}

/* ═══════ GAME SCREEN ═══════ */
.game-bar{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:13px;border-bottom:1px solid var(--b1);
}
.game-id{font-family:var(--fm);font-size:10px;color:var(--t3);letter-spacing:2px;}
.game-id span{color:var(--gold2);}
.timer-pill{
  background:var(--s2);border:1px solid var(--b1);border-radius:16px;
  padding:5px 13px;font-family:var(--fd);font-size:22px;letter-spacing:2px;
  display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);
}
.timer-pill.running{border-color:rgba(212,168,75,.4);color:var(--gold2);}
.dots{display:flex;gap:5px;}
.dot{
  width:24px;height:7px;border-radius:4px;background:var(--b1);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
}
.dot.used{background:var(--redD);}
.dot.active{background:var(--gold);box-shadow:0 0 10px rgba(212,168,75,.5);transform:scaleY(1.3);}
.dot.won{background:var(--gr);}

/* ═══════ CLUE CARDS ═══════ */
.clues{width:100%;margin-bottom:12px;}
.clue{
  background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  margin-bottom:8px;overflow:hidden;
  box-shadow:var(--shadow);
  animation:clueReveal .45s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes clueReveal{
  0%{opacity:0;transform:translateY(-12px) scale(.96);}
  60%{transform:translateY(2px) scale(1.01);}
  100%{opacity:1;transform:none;}
}
.clue-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 15px;background:var(--s1);border-bottom:1px solid var(--b1);
}
.clue-num{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
.clue-tag{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;}
.clue-body{padding:13px 17px;}
.clue-val{font-family:var(--fd);font-size:23px;font-weight:600;color:var(--t1);line-height:1.3;}
.clue-val.mono{font-family:var(--fm);font-size:16px;}

/* ═══════ WRONG GUESSES ═══════ */
.wrongs{width:100%;margin-bottom:10px;}
.wrong{
  display:flex;align-items:center;gap:8px;
  padding:7px 13px;margin-bottom:5px;
  background:var(--redS);border:1px solid rgba(192,37,46,.25);
  border-radius:var(--r);font-family:var(--fm);font-size:12px;color:var(--red);
  animation:wrongIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes wrongIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:none;}}
.wrong::before{content:'✕';font-size:9px;opacity:.7;}

/* ═══════ INPUT ═══════ */
.input-wrap{width:100%;position:relative;margin-bottom:8px;}
.guess-input{
  width:100%;background:var(--s1);border:2px solid var(--b1);border-radius:var(--r);
  padding:14px 52px 14px 17px;font-family:var(--fb);font-size:16px;color:var(--t1);
  outline:none;caret-color:var(--gold);box-shadow:var(--shadow);
  transition:border-color .2s,box-shadow .2s;
}
.guess-input::placeholder{color:var(--t3);}
.guess-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,75,.12);}
.guess-btn{
  position:absolute;right:7px;top:50%;transform:translateY(-50%);
  background:linear-gradient(135deg,var(--red),#D9404A);border:none;
  border-radius:7px;width:38px;height:34px;cursor:pointer;color:#fff;
  font-size:18px;font-family:var(--fd);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 2px 8px rgba(192,37,46,.3);
}
.guess-btn:hover{transform:translateY(-50%) scale(1.05);}

.next-clue-btn{
  width:100%;background:transparent;border:1.5px dashed var(--b2);
  border-radius:var(--r);padding:10px;
  font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--t3);
  cursor:pointer;text-transform:uppercase;transition:all .2s;margin-bottom:8px;
}
.next-clue-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(212,168,75,.15);}
.next-clue-btn:disabled{opacity:.2;cursor:default;}

/* ═══════ RESULT ═══════ */
.milestone{
  width:100%;border-radius:var(--r2);padding:18px;
  margin-bottom:14px;text-align:center;display:none;overflow:hidden;position:relative;
}
.milestone::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.02) 10px,rgba(255,255,255,.02) 11px);
}
.milestone.show{display:block;animation:milestoneIn .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes milestoneIn{0%{opacity:0;transform:scale(.7);}60%{transform:scale(1.05);}100%{opacity:1;transform:none;}}
.m-icon{font-size:32px;margin-bottom:4px;animation:iconBounce 1s ease-in-out .3s both;}
@keyframes iconBounce{0%,100%{transform:none}50%{transform:translateY(-6px)}}
.m-num{font-family:var(--fd);font-size:56px;line-height:1;}
.m-lbl{font-family:var(--fd);font-size:24px;letter-spacing:5px;}
.m-sub{font-family:var(--fm);font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.6);margin-top:4px;}

.prac-note-result{
  width:100%;background:rgba(212,168,75,.1);border:1.5px solid rgba(212,168,75,.3);
  border-radius:var(--r);padding:9px 14px;margin-bottom:12px;
  font-family:var(--fm);font-size:10px;color:var(--gold);
  letter-spacing:2px;text-align:center;display:none;animation:screenIn .3s both;
}

.result-word{
  font-family:var(--fd);font-size:clamp(30px,9vw,48px);letter-spacing:5px;
  margin-bottom:4px;text-align:center;
  animation:screenIn .4s .1s both;
}
.result-word.won{
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(212,168,75,.4));
}
.result-word.lost{color:var(--t3);}
.result-name{
  font-family:var(--fd);font-size:clamp(34px,10vw,54px);font-weight:700;
  line-height:1;margin-bottom:4px;text-align:center;
  animation:screenIn .4s .15s both;
}
.result-name .dim{color:var(--t3);}
.result-msg{
  font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:3px;
  text-transform:uppercase;margin-bottom:18px;text-align:center;
  animation:screenIn .4s .2s both;
}

.score-row{display:flex;gap:8px;margin-bottom:16px;width:100%;}
.score-box{
  flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:13px 8px;text-align:center;box-shadow:var(--shadow);
  animation:numPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
.score-box:nth-child(1){animation-delay:.1s}
.score-box:nth-child(2){animation-delay:.15s}
.score-box:nth-child(3){animation-delay:.2s}
.score-box:nth-child(4){animation-delay:.25s}
